<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Create new post</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:#f5f7fb;
            margin:0;
            padding:40px;
        }

        /* container */

        .container{
            max-width:700px;
            margin:auto;
        }

        /* card */

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        /* title */

        h1{
            margin-top:0;
            margin-bottom:25px;
        }

        /* form */

        .form-group{
            margin-bottom:18px;
        }

        label{
            font-weight:600;
            display:block;
            margin-bottom:6px;
        }

        /* inputs */

        input,
        select,
        textarea{
            width:100%;
            padding:10px 12px;
            border-radius:6px;
            border:1px solid #dcdcdc;
            font-size:14px;
            transition:0.2s;
        }

        textarea{
            resize:vertical;
        }

        input:focus,
        select:focus,
        textarea:focus{
            outline:none;
            border-color:#4a90e2;
            box-shadow:0 0 0 2px rgba(74,144,226,0.15);
        }

        /* buttons */

        .actions{
            margin-top:25px;
            display:flex;
            gap:10px;
        }

        button{
            padding:10px 18px;
            border:none;
            border-radius:6px;
            font-size:14px;
            cursor:pointer;
            background:#28a745;
            color:white;
        }

        button:hover{
            opacity:0.9;
        }

        .back{
            display:inline-block;
            padding:10px 18px;
            border-radius:6px;
            background:#6c757d;
            color:white;
            text-decoration:none;
        }

        .back:hover{
            opacity:0.9;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Create new post</h1>

        <form th:action="@{/posts/create}" method="post" th:object="${post}">

            <div class="form-group">
                <label for="text">Text</label>
                <textarea id="text" th:field="*{text}" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="mediaUrl">Media URL (optional)</label>
                <input type="url" id="mediaUrl" th:field="*{mediaUrl}" />
            </div>

            <div class="form-group">
                <label for="mediaType">Media Type</label>
                <select id="mediaType" th:field="*{mediaType}" required>
                    <option value="TEXT">TEXT</option>
                    <option value="IMAGE">IMAGE</option>
                    <option value="VIDEO">VIDEO</option>
                    <option value="CAROUSEL">CAROUSEL</option>
                </select>
            </div>

            <div class="form-group">
                <label for="scheduledTime">Scheduled Time (required)</label>
                <input type="datetime-local" id="scheduledTime" name="scheduledTime" required />
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="DRAFT">DRAFT</option>
                    <option value="SCHEDULED" selected>SCHEDULED</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit">Save Post</button>
                <a href="/" class="back">Back</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
