<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Auto Post Threads</title>

    <style>

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:linear-gradient(180deg,#f6f8fc,#eef2f7);
            padding:30px;
            color:#1f2937;
        }

        /* container */

        .container{
            width:100%;
        }

        /* header */

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:24px;
        }

        header h1{
            font-size:28px;
            font-weight:700;
        }

        /* card */

        .card{
            background:white;
            border-radius:14px;
            padding:24px;
            box-shadow:0 10px 35px rgba(0,0,0,0.08);
        }

        /* table */

        table{
            width:100%;
            border-collapse:collapse;
            table-layout:auto;
            font-size:14px;
        }

        th{
            text-align:left;
            padding:14px 12px;
            background:#f8fafc;
            border-bottom:1px solid #e5e7eb;
            font-weight:600;
            font-size:15px;
            color:#374151;
        }

        td{
            padding:12px;
            border-bottom:1px solid #f1f1f1;
            font-size:13.5px;
            vertical-align:middle;
        }

        tbody tr:hover{
            background:#f4f8ff;
        }

        /* ID column */

        td:first-child{
            width:70px;
            font-weight:500;
        }

        /* text column */

        .text-cell{
            max-width:500px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        /* status column center */

        .status-cell{
            text-align:center;
        }

        /* status badge */

        .status-badge{
            display:inline-block;
            padding:5px 12px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
        }

        /* status colors */

        .status-draft{
            background:#f3f4f6;
            color:#6b7280;
        }

        .status-scheduled{
            background:#fef3c7;
            color:#92400e;
        }

        .status-published{
            background:#dcfce7;
            color:#166534;
        }

        .status-failed{
            background:#fee2e2;
            color:#991b1b;
        }

        /* actions */

        .actions{
            display:flex;
            gap:8px;
        }

        /* buttons */

        .btn{
            padding:7px 14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            text-decoration:none;
            font-size:13px;
            font-weight:500;
            display:inline-flex;
            align-items:center;
            gap:4px;
            transition:all .18s ease;
        }

        .create{
            background:#2563eb;
            color:white;
            box-shadow:0 4px 14px rgba(37,99,235,0.25);
        }

        .create:hover{
            background:#1d4ed8;
        }

        .detail{
            background:#0ea5e9;
            color:white;
        }

        .detail:hover{
            background:#0284c7;
        }

        .delete{
            background:#ef4444;
            color:white;
        }

        .delete:hover{
            background:#dc2626;
        }

        .btn:hover{
            transform:translateY(-1px);
            box-shadow:0 6px 16px rgba(0,0,0,0.15);
        }

        /* pagination */

        .pagination{
            margin-top:26px;
            display:flex;
            justify-content:center;
            gap:8px;
        }

        .page-btn{
            padding:7px 13px;
            border-radius:8px;
            text-decoration:none;
            border:1px solid #e5e7eb;
            background:white;
            color:#374151;
            font-size:13px;
            transition:all .18s ease;
        }

        .page-btn:hover{
            background:#2563eb;
            color:white;
            border-color:#2563eb;
        }

        .page-active{
            background:#2563eb;
            color:white;
            border-color:#2563eb;
        }

    </style>

</head>

<body>

<div class="container">

    <header>

        <h1>Auto Post Threads</h1>

        <a href="/posts/create" class="btn create">
            + Create Post
        </a>

    </header>

    <div class="card">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Text</th>
                <th>Media</th>
                <th>Status</th>
                <th>Created</th>
                <th>Updated</th>
                <th>Schedule</th>
                <th>Published</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="post : ${posts}">

                <td th:text="${post.id}"></td>

                <td class="text-cell" th:text="${post.text}"></td>

                <td th:text="${post.mediaType}"></td>

                <td class="status-cell">
<span class="status-badge"
      th:text="${post.status}"
      th:classappend="' status-' + ${post.status.name().toLowerCase()}">
</span>
                </td>

                <td th:text="${#temporals.format(post.createdAt,'yyyy-MM-dd HH:mm:ss')}"></td>

                <td th:text="${post.updatedAt != null ? #temporals.format(post.updatedAt,'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></td>

                <td th:text="${#temporals.format(post.scheduledTime,'yyyy-MM-dd HH:mm:ss')}"></td>

                <td th:text="${post.publishedAt != null ? #temporals.format(post.publishedAt,'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></td>

                <td>

                    <div class="actions">

                        <a th:href="@{'/posts/' + ${post.id}}" class="btn detail">
                            Detail
                        </a>

                        <form th:action="@{'/delete/' + ${post.id}(page=${currentPage})}" method="post">
                            <button type="submit" class="btn delete">
                                Delete
                            </button>
                        </form>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

        <div class="pagination">

            <a th:if="${currentPage > 0}"
               th:href="@{/(page=${currentPage-1})}"
               class="page-btn">
                Prev
            </a>

            <a th:each="i : ${#numbers.sequence(0, totalPages-1)}"
               th:href="@{/(page=${i})}"
               th:text="${i+1}"
               th:class="'page-btn ' + (${i} == ${currentPage} ? 'page-active' : '')">
            </a>

            <a th:if="${currentPage < totalPages-1}"
               th:href="@{/(page=${currentPage+1})}"
               class="page-btn">
                Next
            </a>

        </div>

    </div>

</div>

</body>
</html>
